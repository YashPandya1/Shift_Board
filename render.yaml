# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: shiftboard-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      # Set FRONTEND_URL to your Netlify URL, e.g. https://shiftboard.netlify.app
